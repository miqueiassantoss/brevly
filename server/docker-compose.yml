services:
  postgres:
    image: postgres:16
    container_name: brevly-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - brevly-db-data:/var/lib/postgresql/data

volumes:
  brevly-db-data: